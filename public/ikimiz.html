<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <meta name="referrer" content="no-referrer" />
  <title>İkimiz 💞</title>
  <style>
    :root {
      --ink: #1f2937;
      --muted: #6b7280;
      --rose: #e11d48;
      --rose-deep: #be123c;
      --rose-line: #fecdd3;
      --card: rgba(255, 255, 255, 0.95);
      --shadow: 0 20px 60px rgba(0,0,0,0.14);
      --bar-bg: rgba(255,255,255,0.55);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --ink: #f9fafb;
        --muted: #cbd5e1;
        --card: rgba(31, 41, 55, 0.92);
        --rose-line: #7f1d3a;
        --bar-bg: rgba(255,255,255,0.12);
      }
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 22px 16px 110px;
      -webkit-tap-highlight-color: transparent;
      transition: background 1.4s ease, opacity 1.2s ease;
    }
    body.phase-start { background: linear-gradient(160deg, #fef3c7, #ffe4e6); }
    body.phase-0 { background: linear-gradient(160deg, #fef9c3, #fde68a 50%, #ffedd5); }
    body.phase-1 { background: linear-gradient(160deg, #fce7f3, #fbcfe8 60%, #fff1f2); }
    body.phase-2 { background: linear-gradient(160deg, #fbcfe8, #f9a8d4 50%, #ffe4e6); }
    body.phase-3 { background: linear-gradient(160deg, #fda4af, #fb7185 50%, #fecdd3); }
    body.phase-4 { background: linear-gradient(160deg, #fb7185, #e11d48 50%, #f97316); }
    body.phase-5 { background: linear-gradient(160deg, #c7d2fe, #fbcfe8 60%, #fef3c7); }
    body.silence { background: #0a0a0a !important; }
    body.fading  { opacity: 0; }
    @media (prefers-color-scheme: dark) {
      body.phase-start { background: linear-gradient(160deg, #2a1f08, #2a1419); }
      body.phase-0 { background: linear-gradient(160deg, #2a1f08, #1a1208 50%, #2a1419); }
      body.phase-1 { background: linear-gradient(160deg, #2a141f, #1f0f1a 50%, #1a0d12); }
      body.phase-2 { background: linear-gradient(160deg, #3a142a, #2a0f1f 50%, #2a1419); }
      body.phase-3 { background: linear-gradient(160deg, #4a0f1f, #3a0c19 50%, #2a0a14); }
      body.phase-4 { background: linear-gradient(160deg, #5c0f1a, #3d0c0c 50%, #401a08); }
      body.phase-5 { background: linear-gradient(160deg, #1f2147, #2a1428 60%, #2a200f); }
    }

    header { text-align: center; margin-bottom: 8px; transition: opacity 0.6s; }
    body.silence header, body.silence .progress-wrap { opacity: 0; }
    h1 {
      margin: 0;
      font-size: clamp(24px, 5vw, 30px);
      letter-spacing: -0.5px;
      color: var(--rose-deep);
    }
    @media (prefers-color-scheme: dark) { h1 { color: #fda4af; } }

    /* progress */
    .progress-wrap { width: 100%; max-width: 440px; margin: 10px 0 16px; transition: opacity 0.6s; }
    .progress-bar { height: 4px; width: 100%; background: var(--bar-bg); border-radius: 999px; overflow: hidden; }
    .progress-fill {
      height: 100%; width: 0%;
      background: linear-gradient(90deg, #fde68a, #fbcfe8 25%, #f9a8d4 50%, #fb7185 75%, #e11d48);
      border-radius: 999px;
      transition: width 1.2s cubic-bezier(.4,0,.2,1);
    }

    /* shared panels */
    .panel, .card, .pass-screen, .phase-splash, .modal, .closing {
      background: var(--card);
      backdrop-filter: blur(12px);
      border-radius: 24px;
      padding: 28px 24px;
      box-shadow: var(--shadow);
      width: 100%;
      max-width: 440px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      animation: pop 0.45s ease;
    }
    @keyframes pop { from { opacity:0; transform: translateY(10px) scale(.98); } to { opacity:1; transform: translateY(0) scale(1); } }

    .panel { text-align: center; }
    .panel p { margin: 0; font-size: 15px; line-height: 1.6; color: var(--muted); }
    .panel strong { color: var(--ink); }

    label { display: flex; flex-direction: column; gap: 5px; text-align: left; font-size: 13px; color: var(--muted); }
    input[type="text"] {
      border: 1px solid var(--rose-line);
      background: rgba(255,255,255,0.95);
      color: var(--ink);
      padding: 12px 14px;
      border-radius: 12px;
      font-size: 16px;
      outline: none;
      font-family: inherit;
    }
    @media (prefers-color-scheme: dark) {
      input[type="text"] { background: rgba(0,0,0,0.35); color: var(--ink); }
    }
    input[type="text"]:focus { box-shadow: 0 0 0 3px rgba(225, 29, 72, 0.25); }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

    /* CARD */
    .actor {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 12px 14px;
      border-radius: 14px;
      background: rgba(225, 29, 72, 0.08);
      color: var(--rose-deep);
      font-weight: 800;
      font-size: 17px;
      letter-spacing: 0.3px;
    }
    @media (prefers-color-scheme: dark) {
      .actor { background: rgba(253, 164, 175, 0.16); color: #fda4af; }
    }
    .actor.both { background: rgba(99, 102, 241, 0.1); color: #4f46e5; }
    @media (prefers-color-scheme: dark) {
      .actor.both { background: rgba(165, 180, 252, 0.18); color: #a5b4fc; }
    }

    .verb {
      font-size: 22px;
      line-height: 1.45;
      margin: 6px 0;
      font-weight: 600;
      text-align: center;
      min-height: 64px;
    }

    .actions { display: grid; grid-template-columns: 1fr; gap: 8px; }
    .actions-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

    .btn {
      border: 0;
      border-radius: 14px;
      padding: 14px 16px;
      font-size: 15.5px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.05s, background 0.15s, opacity 0.3s;
      font-family: inherit;
    }
    .btn:active:not(:disabled) { transform: scale(0.98); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-primary { background: var(--rose); color: #fff; }
    .btn-primary:hover:not(:disabled) { background: var(--rose-deep); }
    .btn-soft   { background: rgba(225, 29, 72, 0.12); color: var(--rose-deep); }
    @media (prefers-color-scheme: dark) {
      .btn-soft { background: rgba(253, 164, 175, 0.18); color: #fda4af; }
    }
    .btn-pass   { background: transparent; color: var(--muted); border: 1px solid var(--rose-line); }
    .btn-big    { padding: 16px 18px; font-size: 16.5px; }

    body.phase-0 .btn-pass, body.phase-1 .btn-pass { opacity: 0.55; }
    body.phase-3 .btn-soft, body.phase-4 .btn-soft { background: rgba(225, 29, 72, 0.22); }
    @media (prefers-color-scheme: dark) {
      body.phase-3 .btn-soft, body.phase-4 .btn-soft { background: rgba(253, 164, 175, 0.3); }
    }

    /* phone-pass splash */
    .pass-screen, .phase-splash {
      text-align: center;
      align-items: center;
      padding: 44px 24px;
    }
    .pass-icon { font-size: 60px; line-height: 1; }
    .pass-text { font-size: 22px; font-weight: 700; margin: 6px 0 0; }
    .pass-arrow {
      font-size: 30px;
      color: var(--rose);
      animation: arrowPulse 1s ease-in-out infinite;
    }
    @keyframes arrowPulse {
      0%, 100% { transform: translateX(-6px); opacity: 0.6; }
      50%      { transform: translateX(6px);  opacity: 1; }
    }
    .phase-splash .emoji { font-size: 72px; line-height: 1; }
    .phase-splash h2 {
      margin: 0; font-size: 30px;
      color: var(--rose-deep);
      letter-spacing: -0.3px;
    }
    @media (prefers-color-scheme: dark) { .phase-splash h2 { color: #fda4af; } }

    /* mola floating */
    .safebar {
      position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%);
      z-index: 50;
      background: rgba(255, 255, 255, 0.96);
      color: var(--rose-deep);
      font-weight: 700;
      padding: 12px 22px;
      border-radius: 999px;
      box-shadow: 0 10px 28px rgba(0,0,0,0.2);
      border: 1px solid var(--rose-line);
      cursor: pointer; font-size: 14.5px;
    }
    @media (prefers-color-scheme: dark) {
      .safebar { background: rgba(20, 16, 18, 0.94); color: #fda4af; }
    }

    .modal { text-align: center; }
    .modal h2 { margin: 0; color: var(--rose-deep); font-size: 22px; }
    @media (prefers-color-scheme: dark) { .modal h2 { color: #fda4af; } }
    .modal p { margin: 0; font-size: 14.5px; line-height: 1.6; color: var(--muted); }

    .closing {
      text-align: center; align-items: center; padding: 40px 26px;
    }
    .closing p { margin: 0; font-size: 17px; line-height: 1.65; color: var(--ink); font-style: italic; }
    .countdown-bar { height: 3px; width: 100%; background: var(--bar-bg); border-radius: 999px; overflow: hidden; }
    .countdown-fill { height: 100%; width: 100%; background: var(--rose); animation: cd 60s linear forwards; }
    @keyframes cd { from { width: 100%; } to { width: 0%; } }

    .hide { display: none !important; }
  </style>
</head>
<body class="phase-start">

  <header id="hdr">
    <h1>💞 İkimiz</h1>
  </header>

  <div class="progress-wrap hide" id="progress-wrap">
    <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
  </div>

  <!-- START -->
  <section id="screen-start" class="panel">
    <p>Telefonu birlikte tutacaksınız. Her kartta kim ne yapacak yazıyor; sıra geldikçe telefonu devredeceksiniz.</p>
    <div class="row">
      <label>1. kişi
        <input type="text" id="name-a" value="" placeholder="Ad" maxlength="14" />
      </label>
      <label>2. kişi
        <input type="text" id="name-b" value="" placeholder="Ad" maxlength="14" />
      </label>
    </div>
    <p style="font-size: 13px;">
      <strong>Pas</strong> her zaman serbest, açıklama yok. <strong>Yumuşat</strong> daha hafif bir alternatif. <strong>Mola</strong> tuşu her an ekranda.
    </p>
    <button class="btn btn-primary btn-big" id="start-btn">Başla 💞</button>
  </section>

  <!-- PHASE SPLASH (1.5 sn, otomatik geçer) -->
  <section id="screen-phase" class="phase-splash hide">
    <div class="emoji" id="phase-emoji"></div>
    <h2 id="phase-title"></h2>
  </section>

  <!-- PHONE PASS (2 sn, otomatik geçer) -->
  <section id="screen-pass" class="pass-screen hide">
    <div class="pass-icon">📱</div>
    <div class="pass-arrow">→</div>
    <p class="pass-text" id="pass-name"></p>
  </section>

  <!-- ACTION CARD -->
  <section id="screen-play" class="card hide">
    <div class="actor" id="card-actor"></div>
    <p class="verb" id="card-verb"></p>
    <div class="actions">
      <button class="btn btn-primary btn-big" id="btn-do">✅ Yaptık</button>
      <div class="actions-row">
        <button class="btn btn-soft" id="btn-soft">🌿 Yumuşat</button>
        <button class="btn btn-pass" id="btn-pass">⏭️ Pas</button>
      </div>
    </div>
  </section>

  <!-- BREAK -->
  <section id="screen-break" class="modal hide">
    <h2>Mola 🍵</h2>
    <p id="break-text"></p>
    <button class="btn btn-primary btn-big" id="resume">Devam edelim</button>
    <button class="btn btn-pass" id="step-back">Bir adım geri al</button>
    <button class="btn btn-pass" id="finish-now">Bugünlük bitirelim</button>
  </section>

  <!-- CLOSING -->
  <section id="screen-end" class="closing hide">
    <p id="end-text">Birbirinize sarılı kalın.<br/>Bir dakika sonra ekran kapanacak.</p>
    <div class="countdown-bar"><div class="countdown-fill" id="countdown-fill"></div></div>
  </section>

  <button id="safe-bar" class="safebar hide">⏸️ Mola</button>

  <script>
    /* ===== PHASES (sadece görsel marker; açıklama yok) ===== */
    const PHASES = [
      { emoji: "🚪", title: "Eşik" },
      { emoji: "💞", title: "Bağ" },
      { emoji: "✨", title: "Kıvılcım" },
      { emoji: "🌹", title: "Plato" },
      { emoji: "🔥", title: "Doruk" },
      { emoji: "🌙", title: "Çözülme" },
    ];

    /* ===== CARDS — net fiiller, kim ne yapacağı açık.
       Akış başından sonuna kadar bir mahrem deneyimi tamamlar.
       Her kartta: actor (A | B | BOTH) + somut eylem (p) + yumuşak alternatif (s) ===== */
    const CARDS = [
      // ───────────────── 0 — EŞİK (ortam) ─────────────────
      { ph:0, actor:"BOTH", p:"Telefonları başka odaya bırakın.",                                 s:"Sessize alıp yüz üstü çevirin." },
      { ph:0, actor:"BOTH", p:"Işıkları kısın; bir mum yakın ya da gece lambasını açın.",          s:"Tavan ışığını söndürün." },
      { ph:0, actor:"BOTH", p:"Yatağın kenarına karşılıklı oturun, dizleriniz değsin.",            s:"Yan yana oturun, omuzlarınız değsin." },
      { ph:0, actor:"BOTH", p:"Ellerinizi tutun, gözlerinin içine bakarak üç derin nefes alın.",   s:"Sadece elini tutun, gözlerinize bakın." },

      // ───────────────── 1 — BAĞ (giysili, duygusal) ─────────────────
      { ph:1, actor:"A",    p:"Ona bugün onda fark ettiğin güzel bir şeyi söyle.",                 s:"Tek kelime fısılda." },
      { ph:1, actor:"B",    p:"Şimdi sen söyle: onda fark ettiğin bir güzelliği.",                 s:"Tek kelime fısılda." },
      { ph:1, actor:"A",    p:"Ellerini al, başparmaklarınla avucunu yavaşça çiz.",                s:"Sadece avucunda bir kelime yaz." },
      { ph:1, actor:"B",    p:"Sıra sende — onun ellerini al, avucunu yavaşça çiz.",               s:"Sadece avucunda bir kelime yaz." },
      { ph:1, actor:"BOTH", p:"Alınlarınızı birbirine dayayın; 30 saniye konuşmadan kalın.",       s:"Birbirinize sarılın, 30 sn sessizce." },

      // ───────────────── 2 — KIVILCIM (giysili dokunuş) ─────────────────
      { ph:2, actor:"A",    p:"Parmaklarını saçlarının arasından yavaşça geçir; ensesini okşa.",   s:"Saçlarını yavaşça okşa." },
      { ph:2, actor:"B",    p:"Sen geçir parmaklarını saçlarının arasından; ensesini okşa.",       s:"Saçlarını yavaşça okşa." },
      { ph:2, actor:"A",    p:"Boynuna yumuşak, uzun bir öpücük ver; sonra geri çekil.",           s:"Yanağına bir öpücük ver." },
      { ph:2, actor:"B",    p:"Sıra sende — boynuna yumuşak bir öpücük.",                          s:"Yanağına bir öpücük ver." },
      { ph:2, actor:"A",    p:"Kulağına bu gece istediğin bir şeyi fısılda.",                      s:"Kulağına 'seni istiyorum' fısılda." },
      { ph:2, actor:"B",    p:"Sen fısılda kulağına ne istediğini.",                                s:"Kulağına 'seni istiyorum' fısılda." },
      { ph:2, actor:"BOTH", p:"Dudak dudağa, yavaş bir öpücük — en az 10 saniye, gözler kapalı.",  s:"Kısa, sıcak bir öpücük." },

      // ───────────────── 3 — PLATO (soyunma + cilt teması) ─────────────────
      { ph:3, actor:"BOTH", p:"Birbirinizi yavaşça soyun; iç giysileriniz şimdilik kalsın.",        s:"Üstünüzdeki rahat giysileri çıkarın, alt katları kalsın." },
      { ph:3, actor:"A",    p:"Elini onun göğsüne koy; kalbinin ritmini hisset.",                   s:"Elini omzuna koy, gözlerine bak." },
      { ph:3, actor:"B",    p:"Sen koy elini onun göğsüne; kalbini hisset.",                        s:"Elini omzuna koy, gözlerine bak." },
      { ph:3, actor:"A",    p:"Dudaklarınla göğsünden karnına doğru yavaş öpücükler bırak.",        s:"Sadece göğsüne tek bir öpücük." },
      { ph:3, actor:"B",    p:"Sıra sende — boynundan göğsüne yavaş öpücükler bırak.",              s:"Sadece göğsüne tek bir öpücük." },
      { ph:3, actor:"BOTH", p:"Birbirinize sımsıkı sarılın; çıplak teninizi hissedin, hareket etmeyin.", s:"İç içe sarılın, giysiler kalsın." },
      { ph:3, actor:"A",    p:"Elini yavaşça onun beline, ardından kalçasına götür.",               s:"Elini sadece beline koy." },
      { ph:3, actor:"B",    p:"Sen götür elini onun beline, kalçasına.",                            s:"Elini sadece beline koy." },
      { ph:3, actor:"BOTH", p:"Kalan iç giysilerinizi birlikte çıkarın.",                           s:"Birinizinki kalsın; karar verin." },

      // ───────────────── 4 — DORUK (birleşme) ─────────────────
      { ph:4, actor:"A",    p:"Onun bedenine yavaşça yaslan; gözlerinin içine bak.",                s:"Yan yana uzanın, dokunmaya devam edin." },
      { ph:4, actor:"BOTH", p:"Birbirinize ait olun. Sevişin — acelesiz, gözler buluşsun.",         s:"Yakın temas, sürtünme, öpüşme — şimdilik daha ileri gitmeyin." },
      { ph:4, actor:"A",    p:"Yavaşla. Onun nefesini dinle; onun ritmini takip et.",               s:"Sadece sarılı kalın; nefes alın." },
      { ph:4, actor:"B",    p:"Şimdi sen yönlendir; nasıl olmasını istediğini göster.",             s:"Sadece sarılı kalın; nefes alın." },
      { ph:4, actor:"BOTH", p:"Sesi bastırmayın; nefes, inilti, isim — ne çıkıyorsa.",              s:"Sessiz kalmak da meşru." },
      { ph:4, actor:"BOTH", p:"Birlikte doruğa gidin — ya da gitmeyin. İkisi de güzel.",            s:"Burada durun; sarılarak nefes alın." },

      // ───────────────── 5 — ÇÖZÜLME (yumuşak iniş) ─────────────────
      { ph:5, actor:"BOTH", p:"İç içe uzanın; başının altın omzunda olsun. Konuşmayın.",            s:"Yan yana uzanın, ellerinizi tutun." },
      { ph:5, actor:"BOTH", p:"5 dakika dokunarak, sessizce kalın.",                                s:"2 dakika kalın." },
      { ph:5, actor:"A",    p:"Sor: \"Az önce en güzel an hangisiydi?\" — sonra dinle.",            s:"Sadece 'iyi ki varsın' de." },
      { ph:5, actor:"B",    p:"Sen sor: \"Senin için en güzel an neydi?\" — dinle.",                s:"Sadece 'iyi ki varsın' de." },
      { ph:5, actor:"A",    p:"Bir şey için ona teşekkür et — bu akşamdan bağımsız bir şey.",        s:"Elini tut, gülümse." },
      { ph:5, actor:"B",    p:"Sıra sende — ona bir şey için teşekkür et.",                          s:"Elini tut, gülümse." },
      { ph:5, actor:"BOTH", p:"Birbirinize sarılarak gözlerinizi kapatın; uyumaya yakın hissedin.",  s:"Yan yana uzanın; gözler açık olabilir." },
    ];

    /* ===== STATE ===== */
    let names = { A: "Sen", B: "Eşim" };
    let idx = 0;            // index in CARDS
    let softened = false;
    let passStreak = 0;
    let currentActor = null;       // hangi aktör şu an aktif (telefon kimde)
    let lastShownPhase = -1;
    const SCREENS = ["screen-start","screen-phase","screen-pass","screen-play","screen-break","screen-end"];

    const $ = id => document.getElementById(id);
    function show(id) {
      SCREENS.forEach(s => $(s).classList.toggle("hide", s !== id));
      $("safe-bar").classList.toggle("hide", id !== "screen-play");
      $("progress-wrap").classList.toggle("hide", id === "screen-start" || id === "screen-end");
    }
    function setPhaseBg(idx) {
      document.body.classList.remove("phase-start","phase-0","phase-1","phase-2","phase-3","phase-4","phase-5","silence");
      document.body.classList.add("phase-" + idx);
    }
    function updateProgress() {
      const pct = Math.min(100, Math.round((idx / CARDS.length) * 100));
      $("progress-fill").style.width = pct + "%";
    }
    function nameOf(actor) {
      if (actor === "A") return names.A;
      if (actor === "B") return names.B;
      return "İkiniz birlikte";
    }
    function silentTransition(then, ms) {
      document.body.classList.add("silence");
      setTimeout(() => {
        document.body.classList.remove("silence");
        then();
      }, ms || 1600);
    }

    /* ===== FLOW ===== */
    function startJourney() {
      const a = $("name-a").value.trim() || "1. kişi";
      const b = $("name-b").value.trim() || "2. kişi";
      names = { A: a, B: b };
      idx = 0;
      passStreak = 0;
      currentActor = null;
      lastShownPhase = -1;
      goToNext();
    }

    function goToNext() {
      if (idx >= CARDS.length) { showClosing(true); return; }
      const card = CARDS[idx];
      // Faz değişti mi? → phase splash
      if (card.ph !== lastShownPhase) {
        lastShownPhase = card.ph;
        setPhaseBg(card.ph);
        updateProgress();
        $("phase-emoji").textContent = PHASES[card.ph].emoji;
        $("phase-title").textContent = PHASES[card.ph].title;
        show("screen-phase");
        setTimeout(() => {
          maybePhonePassThenCard();
        }, 1600);
        return;
      }
      maybePhonePassThenCard();
    }

    function maybePhonePassThenCard() {
      const card = CARDS[idx];
      // Telefon devretme gerekiyor mu?
      // Devret: yeni actor "A" veya "B" ise ve önceki actor'dan farklıysa.
      // "BOTH" → devretme göstermiyoruz (ikisinin elinde kabul).
      const needPass = (card.actor === "A" || card.actor === "B") && card.actor !== currentActor;
      if (needPass) {
        $("pass-name").textContent = nameOf(card.actor) + ", telefonu sen al";
        show("screen-pass");
        setTimeout(() => {
          currentActor = card.actor;
          renderCard();
        }, 2200);
      } else {
        if (card.actor === "BOTH") currentActor = "BOTH";
        renderCard();
      }
    }

    function renderCard() {
      const card = CARDS[idx];
      softened = false;
      const actorEl = $("card-actor");
      actorEl.classList.toggle("both", card.actor === "BOTH");
      if (card.actor === "BOTH") {
        actorEl.textContent = "👫  İkiniz birlikte";
      } else {
        actorEl.textContent = "📱  Sıra: " + nameOf(card.actor);
      }
      $("card-verb").textContent = card.p;
      $("btn-soft").disabled = false;
      updateProgress();
      show("screen-play");
    }

    function advance(viaPass) {
      if (!viaPass) passStreak = 0;
      idx++;
      goToNext();
    }

    function onDone() { advance(false); }
    function onSoft() {
      if (softened) return;
      softened = true;
      $("card-verb").textContent = CARDS[idx].s;
      $("btn-soft").disabled = true;
    }
    function onPass() {
      passStreak++;
      if (passStreak >= 3) {
        passStreak = 0;
        $("break-text").textContent = "Üst üste birkaç pas verdiniz — bu son derece normal. Bir nefes, bir bardak su ya da sadece sarılma iyi gelir.";
        show("screen-break");
        return;
      }
      advance(true);
    }
    function onSafeWord() {
      $("break-text").textContent = "Şimdi sadece nefes alalım. İstersen devam edebilir, bir adım geri alabilir ya da bugünlük bitirebiliriz.";
      show("screen-break");
    }
    function onStepBack() {
      if (idx > 0) {
        idx--;
        // önceki aktöre dönüş — gerekirse pass splash gösterilebilir, ama basit tutuyoruz
        const prevCard = CARDS[idx];
        currentActor = (prevCard.actor === "BOTH") ? "BOTH" : prevCard.actor;
        setPhaseBg(prevCard.ph);
        lastShownPhase = prevCard.ph;
      }
      renderCard();
    }
    function showClosing(completed) {
      $("end-text").innerHTML = completed
        ? "Birbirinize sarılı kalın.<br/>Bir dakika sonra ekran kapanacak."
        : "Birbirinize zaman ayırdınız.<br/>Bir dakika sonra ekran kapanacak.";
      const cf = $("countdown-fill");
      cf.style.animation = "none"; void cf.offsetWidth; cf.style.animation = "";
      show("screen-end");
      setTimeout(() => {
        document.body.classList.add("fading");
        setTimeout(() => {
          document.body.style.background = "#000";
          $("screen-end").style.display = "none";
          $("hdr").style.display = "none";
          $("progress-wrap").classList.add("hide");
        }, 1200);
      }, 60000);
    }

    /* ===== EVENTS ===== */
    $("start-btn").addEventListener("click", startJourney);
    $("btn-do").addEventListener("click", onDone);
    $("btn-soft").addEventListener("click", onSoft);
    $("btn-pass").addEventListener("click", onPass);
    $("safe-bar").addEventListener("click", onSafeWord);
    $("resume").addEventListener("click", () => show("screen-play"));
    $("step-back").addEventListener("click", onStepBack);
    $("finish-now").addEventListener("click", () => showClosing(false));

    show("screen-start");
  </script>
</body>
</html>
