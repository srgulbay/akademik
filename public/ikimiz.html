<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <meta name="referrer" content="no-referrer" />
  <title>İkimiz 🔥</title>
  <style>
    :root {
      --bg-1: #fed7aa;
      --bg-2: #ffe4e6;
      --rose: #e11d48;
      --rose-deep: #be123c;
      --rose-line: #fecdd3;
      --ink: #1f2937;
      --muted: #6b7280;
      --card: rgba(255, 255, 255, 0.95);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg-1: #2a0f10;
        --bg-2: #3e1d05;
        --ink: #f9fafb;
        --muted: #cbd5e1;
        --card: rgba(31, 41, 55, 0.92);
        --rose-line: #7f1d3a;
      }
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: linear-gradient(135deg, var(--bg-1), var(--bg-2));
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px 110px;
      -webkit-tap-highlight-color: transparent;
    }

    header {
      text-align: center;
      margin-bottom: 14px;
    }
    h1 {
      margin: 0;
      font-size: clamp(32px, 7vw, 44px);
      color: var(--rose);
      letter-spacing: -0.5px;
    }
    .subtitle {
      color: var(--muted);
      margin-top: 6px;
      font-size: 14px;
      max-width: 360px;
    }

    /* Start screen */
    .start {
      background: var(--card);
      border-radius: 24px;
      padding: 28px;
      box-shadow: 0 16px 48px rgba(0,0,0,0.12);
      width: 100%;
      max-width: 380px;
      text-align: center;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .start p { margin: 0; font-size: 15px; line-height: 1.55; color: var(--muted); }
    .start strong { color: var(--ink); }

    /* Card */
    .card {
      background: var(--card);
      border-radius: 24px;
      padding: 30px 26px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.16);
      width: 100%;
      max-width: 440px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      animation: pop 0.35s ease;
    }
    @keyframes pop {
      from { opacity: 0; transform: translateY(8px) scale(0.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    .card-prompt {
      font-size: 19px;
      line-height: 1.55;
      margin: 0;
      min-height: 60px;
    }
    .badge {
      align-self: flex-start;
      font-size: 11.5px;
      padding: 4px 10px;
      border-radius: 999px;
      background: #fed7aa;
      color: #9a3412;
      font-weight: 600;
    }
    @media (prefers-color-scheme: dark) {
      .badge { background: #7c2d12; color: #fed7aa; }
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
    }
    .btn {
      border: 0;
      border-radius: 14px;
      padding: 14px 16px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.05s, background 0.15s, opacity 0.15s;
      width: 100%;
    }
    .btn:active:not(:disabled) { transform: scale(0.98); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-primary { background: var(--rose); color: #fff; }
    .btn-primary:hover:not(:disabled) { background: var(--rose-deep); }
    .btn-soft {
      background: rgba(244, 63, 94, 0.12);
      color: var(--rose);
    }
    .btn-pass {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--rose-line);
    }

    .row3 {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
    }
    .row3 .btn { font-size: 14px; padding: 12px 6px; }

    /* Safe word floating */
    .safebar {
      position: fixed;
      bottom: 18px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 50;
      background: rgba(255, 255, 255, 0.96);
      color: var(--rose);
      font-weight: 700;
      padding: 12px 22px;
      border-radius: 999px;
      box-shadow: 0 10px 28px rgba(0,0,0,0.18);
      border: 1px solid var(--rose-line);
      cursor: pointer;
      font-size: 15px;
    }
    @media (prefers-color-scheme: dark) {
      .safebar { background: rgba(20, 16, 18, 0.92); }
    }

    .hint { font-size: 12px; color: var(--muted); text-align: center; }
    .stats { color: var(--muted); font-size: 12.5px; margin-top: 12px; }

    .hide { display: none !important; }

    /* Break / end panels */
    .modal {
      background: var(--card);
      border-radius: 22px;
      padding: 26px;
      box-shadow: 0 16px 48px rgba(0,0,0,0.18);
      width: 100%;
      max-width: 380px;
      text-align: center;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .modal h2 { margin: 0; color: var(--rose); }
    .modal p { margin: 0; color: var(--muted); font-size: 14.5px; line-height: 1.55; }
  </style>
</head>
<body>

  <header>
    <h1>🔥 İkimiz</h1>
    <p class="subtitle">Sadece ikinize ait, acelesiz bir oyun.</p>
  </header>

  <!-- START -->
  <section id="screen-start" class="start">
    <p>
      Hazırsan bir kart çekelim. <strong>Pas</strong> diyebilirsin — kimseden açıklama beklenmez.<br />
      Her an aşağıdaki <strong>Mola</strong> tuşuyla durabiliriz.
    </p>
    <button class="btn btn-primary" id="start-btn">Başla 💞</button>
  </section>

  <!-- PLAYING -->
  <section id="screen-play" class="card hide">
    <span class="badge">🔥 Tutku</span>
    <p class="card-prompt" id="prompt">—</p>
    <div class="row3">
      <button class="btn btn-primary" id="btn-do">✅ Yap</button>
      <button class="btn btn-soft"    id="btn-soft">🌿 Yumuşat</button>
      <button class="btn btn-pass"    id="btn-pass">⏭️ Pas</button>
    </div>
    <p class="hint">Pas için açıklama gerekmez.</p>
    <div class="stats" id="stats">✅ 0 · 🌿 0 · ⏭️ 0</div>
  </section>

  <!-- BREAK -->
  <section id="screen-break" class="modal hide">
    <h2>Mola 🍵</h2>
    <p id="break-text"></p>
    <button class="btn btn-primary" id="resume">Devam edelim</button>
    <button class="btn btn-pass" id="finish">Bugünlük bitirelim</button>
  </section>

  <!-- ENDED -->
  <section id="screen-end" class="modal hide">
    <h2>Bugünlük buraya kadar 💞</h2>
    <p id="end-text"></p>
    <button class="btn btn-primary" id="restart">Baştan başla</button>
  </section>

  <!-- Floating safe word -->
  <button id="safe-bar" class="safebar hide">⏸️ Mola</button>

  <script>
    const CARDS = [
      { p: "Kulağına en sevdiği şekilde, yavaşça 'seni istiyorum' fısılda.", s: "Sadece 'seni seviyorum' fısılda." },
      { p: "Gözlerini kapasın; bir dakika boyunca sadece sen yavaşça dokun.", s: "Elini ve kolunu okşa." },
      { p: "Boynunun en hassas yerine yumuşak, uzun bir öpücük ver.", s: "Yanağına bir öpücük ver." },
      { p: "Bedeninde en çok sevdiğin yeri kulağına fısılda.", s: "Sadece 'çok güzelsin' fısılda." },
      { p: "Bir dakika sıra sende: nasıl dokunulmasını istediğini söyle, o sadece dinlesin.", s: "Şu an iyi hissettirecek bir şeyi söyle." },
      { p: "Onun elini al ve nereye dokunmak istediğini sessizce göster.", s: "Sadece elini tut." },
      { p: "Saçlarının arasına parmaklarını kaybet, gözlerinin içine bak.", s: "Saçlarını yavaşça okşa." },
      { p: "Dudaklarına yavaş, uzun bir öpücük; en az 5 saniye.", s: "Kısa, sıcak bir öpücük yeter." },
      { p: "Bir cümleyle, onu bedeniyle ne kadar arzuladığını söyle.", s: "Bir cümleyle ne kadar sevdiğini söyle." },
      { p: "Gözlerini kapatsın; öpücüğü nereye konduracağını tahmin etsin.", s: "Sadece eline bir öpücük ver." },
      { p: "Onun bu an için bir isteği var mı, sor ve sadece dinle.", s: "Onu rahat ettirecek bir şey söyle." },
      { p: "Kulağına üç kelimeyle bir hayalini fısılda.", s: "'Seni özledim' fısılda." },
      { p: "Birlikte denemek istediğin küçük bir şeyi söyle; evet / hayır / sonra desin.", s: "'Yakınlaşmak istiyorum' demen yeter." },
      { p: "İki dakika kıpırdamadan onun kollarında kal.", s: "30 saniye sarılın." },
      { p: "Bir parmağınla yüzünün hatlarını çok yavaş çiz.", s: "Yanağına bir kez dokun." },
      { p: "Kokusunu içine çek, kulağına ne hissettiğini söyle.", s: "'Kokun güzel' de." },
      { p: "Müzik aç, ışıkları kıs; bir dakika sarılarak sallanın.", s: "Sadece yan yana otur, elini tut." },
      { p: "Gözlerinin içine 30 saniye bak, hiçbir şey söyleme; sonra öp.", s: "Sadece bak, konuşmayın." },
      { p: "Bu gece için ona küçük bir ritüel öner (mum, müzik, masaj).", s: "'Sana bu gece özel bir şey hazırlamak istiyorum' de." },
      { p: "Elini kalbinin üstüne koy; nefesini yavaşlatın.", s: "Sadece el ele tutuşun, nefes alın." },
    ];

    const $ = id => document.getElementById(id);
    const screens = ["screen-start","screen-play","screen-break","screen-end"];
    function show(id) {
      screens.forEach(s => $(s).classList.toggle("hide", s !== id));
      $("safe-bar").classList.toggle("hide", id !== "screen-play");
    }
    function shuffle(a) {
      const arr = a.slice();
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    let deck = [];
    let current = null;
    let softened = false;
    let stats = { done: 0, soft: 0, passed: 0 };
    let passStreak = 0;

    function drawNext() {
      if (deck.length === 0) deck = shuffle(CARDS);
      current = deck.shift();
      softened = false;
      $("prompt").textContent = current.p;
      $("btn-soft").disabled = false;
    }
    function renderStats() {
      $("stats").textContent = `✅ ${stats.done} · 🌿 ${stats.soft} · ⏭️ ${stats.passed}`;
    }

    $("start-btn").addEventListener("click", () => {
      deck = shuffle(CARDS);
      stats = { done: 0, soft: 0, passed: 0 };
      passStreak = 0;
      drawNext();
      renderStats();
      show("screen-play");
    });

    $("btn-do").addEventListener("click", () => {
      if (softened) stats.soft++;
      else stats.done++;
      passStreak = 0;
      renderStats();
      drawNext();
    });

    $("btn-soft").addEventListener("click", () => {
      if (softened) return;
      softened = true;
      $("prompt").textContent = current.s;
      $("btn-soft").disabled = true;
    });

    $("btn-pass").addEventListener("click", () => {
      stats.passed++;
      passStreak++;
      renderStats();
      if (passStreak >= 3) {
        passStreak = 0;
        $("break-text").textContent = "Birkaç kart üst üste pas geçildi — bu son derece normal. Belki şimdi bir çay/kahve ya da sarılma molası iyi gelir. ✨";
        show("screen-break");
        return;
      }
      drawNext();
    });

    $("safe-bar").addEventListener("click", () => {
      $("break-text").textContent = "Şimdi sadece nefes alalım. İstersen burada bitirebilir, istersen devam edebiliriz.";
      show("screen-break");
    });

    $("resume").addEventListener("click", () => show("screen-play"));
    $("finish").addEventListener("click", () => {
      $("end-text").innerHTML = `Birbirinize zaman ayırdığınız için teşekkürler. <strong>${stats.done}</strong> kart tamamlandı, <strong>${stats.soft}</strong> yumuşatıldı, <strong>${stats.passed}</strong> pas geçildi. Her seçim aynı derecede değerli.`;
      show("screen-end");
    });
    $("restart").addEventListener("click", () => show("screen-start"));

    show("screen-start");
  </script>
</body>
</html>
